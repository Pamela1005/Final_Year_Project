<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Career Counseling System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#0f172a;
color:white;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.navbar{
width:85%;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 0;
}

.logo{
font-size:28px;
font-weight:bold;
color:white;
}

.menu ul{
display:flex;
list-style:none;
}

.menu ul li{
margin-left:30px;
}

.menu ul li a{
text-decoration:none;
color:white;
font-size:18px;
transition:0.3s;
}

.menu ul li a:hover{
color:#38bdf8;
}

.content{
width:80%;
margin:auto;
margin-top:150px;
max-width:650px;
}

.content h1{
font-size:60px;
line-height:70px;
}

.content span{
color:#38bdf8;
}

.par{
margin-top:20px;
font-size:18px;
line-height:28px;
color:#cbd5f5;
}

.btn{
margin-top:30px;
padding:12px 25px;
border:none;
background:#38bdf8;
color:white;
font-size:16px;
border-radius:25px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#0ea5e9;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="navbar">

<div class="logo">
SmartCareer AI
</div>

<div class="menu">
<ul>
<li><a href="login.html">Login</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="/about">About</a></li>
</ul>
</div>

</div>

<div class="content">

<h1>
AI Based <br>
<span>Career Recommendation</span>
</h1>

<p class="par">
Discover your perfect career path using Artificial Intelligence.
Our system analyzes skills, interests, and academic performance
to recommend the best career opportunities.
</p>

</div>

<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle{
constructor(){
this.x = Math.random()*canvas.width;
this.y = Math.random()*canvas.height;
this.vx = (Math.random()-0.5)*1;
this.vy = (Math.random()-0.5)*1;
this.size = 2;
}

move(){
this.x += this.vx;
this.y += this.vy;

if(this.x<0 || this.x>canvas.width) this.vx *= -1;
if(this.y<0 || this.y>canvas.height) this.vy *= -1;
}

draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle="#38bdf8";
ctx.fill();
}
}

for(let i=0;i<120;i++){
particles.push(new Particle());
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.move();
p.draw();
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
